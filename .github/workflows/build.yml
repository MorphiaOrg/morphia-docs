name: Docs

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Set up jbang
        uses: jbangdev/jbang-action@v0.138.0

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('versions.list') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Configure git identity
        run: |
          git config --global user.name evanchooly
          git config --global user.email jlee@antwerkz.com

      - name: Build site
        run: make site

      - name: Sync to gh-pages
        env:
          REMOTE_REPO: https://evanchooly:${{ secrets.GH_PUSH_TOKEN }}@github.com/MorphiaOrg/morphia-docs.git
        run: make publish
